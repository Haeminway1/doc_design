            <h2 class="part-intro-title">의문사 (Interrogatives)</h2>
            <h3 class="part-intro-subtitle eng-text">The Art of Asking Questions</h3>
            <hr class="part-intro-divider">
            <p class="part-intro-description">
                의문사(Interrogative)는 문장에서 질문의 핵심 정보를 이끌어내는 품사입니다. '누가, 언제, 어디서, 무엇을, 어떻게, 왜'와 같은 육하원칙의 정보를 물을 때 사용되며, 문장의 종류를 의문문으로 만드는 핵심적인 역할을 합니다. 이 파트에서는 의문사의 종류와 정확한 쓰임을 완벽하게 마스터합니다.
            </p>
