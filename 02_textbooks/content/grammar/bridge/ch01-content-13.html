<div class="section-title eng-text">4.6. affect vs. effect</div>
            <table class="grammar-table">
                <thead><tr><th>구분</th><th>affect (동사)</th><th>effect (명사/동사)</th></tr></thead>
                <tbody>
                    <tr><td><b>의미</b></td><td>~에 영향을 미치다</td><td>(명) 효과, 결과 / (동) (결과를) 가져오다</td></tr>
                    <tr><td><b>핵심</b></td><td>대부분 동사로 사용</td><td>대부분 명사로 사용</td></tr>
                </tbody>
            </table>
            <div class="tip-box">
                <div class="tip-box-title eng-text">Vera's Tip</div>
                'A'는 Action(동작, 동사), 'E'는 End-result(결과, 명사)로 기억하면 쉽습니다!
            </div>

            <div class="section-title eng-text">4.7. hang의 두 얼굴</div>
            <table class="grammar-table">
                <thead><tr><th>구분</th><th>hang (일반적 의미)</th><th>hang (교수형)</th></tr></thead>
                <tbody>
                    <tr><td><b>의미</b></td><td>걸다, 매달다</td><td>목매달다, 교수형에 처하다</td></tr>
                    <tr><td><b>3단 변화</b></td><td><b>hang - hung - hung</b></td><td><b>hang - hanged - hanged</b></td></tr>
                </tbody>
